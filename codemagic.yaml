          fi
          if echo "$FIREBASE_IOS_PLIST_BASE64" | tr -d '\n\r' | base64 --decode > ios/Runner/GoogleService-Info.plist; then
            echo "GoogleService-Info.plist injected from FIREBASE_IOS_PLIST_BASE64"
          else
            echo "ERROR: FIREBASE_IOS_PLIST_BASE64 no es base64 valido."
            rm -f ios/Runner/GoogleService-Info.plist
            exit 1
          fi
          python3 scripts/ensure_google_service_plist.py \
            ios/Runner.xcodeproj/project.pbxproj \
            ios/Runner/GoogleService-Info.plist \
            "${IOS_BUNDLE_IDENTIFIER}"
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Re-apply push entitlements after profiles
        script: |
          python3 scripts/ensure_ios_push_capabilities.py \
            ios/Runner.xcodeproj/project.pbxproj
          python3 scripts/ensure_ios_push_entitlements.py \
            ios/Runner.xcodeproj/project.pbxproj \
            Runner/Runner.entitlements
      - name: Verify push entitlements in project
        script: |
          echo "== Runner entitlements =="
          cat ios/Runner/Runner.entitlements || true
          echo "== CODE_SIGN_ENTITLEMENTS in project =="
          grep -n "CODE_SIGN_ENTITLEMENTS" ios/Runner.xcodeproj/project.pbxproj || true
          echo "== SystemCapabilities references =="
          grep -n "SystemCapabilities\\|com.apple.Push\\|com.apple.BackgroundModes" ios/Runner.xcodeproj/project.pbxproj || true
          echo "== aps-environment references =="
          grep -n "aps-environment" ios/Runner/Runner.entitlements ios/Runner.xcodeproj/project.pbxproj || true
          echo "== Effective Release build settings =="
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -showBuildSettings | \
            grep -E "CODE_SIGN_ENTITLEMENTS|PRODUCT_BUNDLE_IDENTIFIER|PROVISIONING_PROFILE_SPECIFIER|DEVELOPMENT_TEAM|CODE_SIGN_STYLE" || true
      - name: Debug signing assets
        script: |
          echo "== Code signing identities =="
          security find-identity -v -p codesigning || true
          echo "== Provisioning profiles =="
          ls -lah ~/Library/MobileDevice/Provisioning\ Profiles || true
          echo "== Profiles match bundle id =="
          grep -R "${IOS_BUNDLE_IDENTIFIER}" ~/Library/MobileDevice/Provisioning\ Profiles 2>/dev/null | head -n 20 || true
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Apply custom app icon (optional)
        script: |
          if [ -f assets/icon.png ]; then
            # Ensure iOS icon source is square 1024x1024 before generation.
            WIDTH="$(sips -g pixelWidth assets/icon.png | awk '/pixelWidth/{print $2}')"
            HEIGHT="$(sips -g pixelHeight assets/icon.png | awk '/pixelHeight/{print $2}')"
            if [ "$WIDTH" != "$HEIGHT" ]; then
              MIN_SIDE="$WIDTH"
              if [ "$HEIGHT" -lt "$WIDTH" ]; then MIN_SIDE="$HEIGHT"; fi
              sips -c "$MIN_SIDE" "$MIN_SIDE" assets/icon.png --out /tmp/icon-square.png >/dev/null
              sips -z 1024 1024 /tmp/icon-square.png --out assets/icon.png >/dev/null
            else
              sips -z 1024 1024 assets/icon.png --out assets/icon.png >/dev/null
            fi
            flutter pub run flutter_launcher_icons
          else
            echo "No assets/icon.png found, using default icon."
          fi
      - name: Build iOS IPA validation
        script: |
          PROFILE_PATH="$(find ~/Library/MobileDevice/Provisioning\ Profiles -type f -name "*.mobileprovision" | head -n 1)"
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: Provisioning profile for ${IOS_BUNDLE_IDENTIFIER} not found in runner."
            ls -lah ~/Library/MobileDevice/Provisioning\ Profiles || true
            exit 70
          fi
          security cms -D -i "$PROFILE_PATH" > /tmp/profile_for_archive.plist
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile_for_archive.plist 2>/dev/null || true)"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile_for_archive.plist 2>/dev/null || true)"
          EXPECTED_PROFILE_APP_ID="${APPLE_TEAM_ID}.${IOS_BUNDLE_IDENTIFIER}"
          if [ -z "$PROFILE_NAME" ]; then
            echo "ERROR: Could not parse provisioning profile name from $PROFILE_PATH"
            exit 70
          fi
          if [[ "$PROFILE_APP_ID" != "$EXPECTED_PROFILE_APP_ID" ]]; then
            echo "ERROR: Profile does not match expected app id $EXPECTED_PROFILE_APP_ID"
            echo "Found: $PROFILE_APP_ID"
            exit 70
          fi

          SAFE_BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-1}}"
          SAFE_BUILD_NUMBER="$(echo "$SAFE_BUILD_NUMBER" | tr -cd '0-9')"
          SAFE_BUILD_NUMBER="${SAFE_BUILD_NUMBER:0:18}"
          if [ -z "$SAFE_BUILD_NUMBER" ]; then SAFE_BUILD_NUMBER="1"; fi
          echo "Using iOS build-number: $SAFE_BUILD_NUMBER"
          flutter build ios --release --no-codesign \
            "--build-name=${APP_STORE_VERSION}" \
            "--build-number=${SAFE_BUILD_NUMBER}" \
            "--dart-define=APP_DISPLAY_NAME=${APP_DISPLAY_NAME}" \
            "--dart-define=APP_BASE_URL=${APP_BASE_URL}" \
            "--dart-define=APP_VERSION=${APP_VERSION}"
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="${IOS_BUNDLE_IDENTIFIER}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_ENTITLEMENTS=Runner/Runner.entitlements \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            archive
      - name: Export IPA from archive if missing
        script: |
          if ! find build -type f -name "*.ipa" | grep -q .; then
            ARCHIVE_PATH="$(find build -type d -name "Runner.xcarchive" | head -n 1)"
            if [ -n "$ARCHIVE_PATH" ]; then
              PROFILE_PATH="$(find ~/Library/MobileDevice/Provisioning\ Profiles -type f -name "*.mobileprovision" | head -n 1)"
              if [ -z "$PROFILE_PATH" ]; then
                echo "ERROR: Provisioning profile for ${IOS_BUNDLE_IDENTIFIER} not found in runner."
                ls -lah ~/Library/MobileDevice/Provisioning\ Profiles || true
                exit 70
              fi
              security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
              PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist 2>/dev/null || true)"
              PROFILE_UUID="$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist 2>/dev/null || true)"
              PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist 2>/dev/null || true)"
              echo "Using profile path: $PROFILE_PATH"
              echo "Using profile app id: $PROFILE_APP_ID"
              echo "Using profile UUID: $PROFILE_UUID"
              echo "Using profile Name: $PROFILE_NAME"
              EXPECTED_PROFILE_APP_ID="${APPLE_TEAM_ID}.${IOS_BUNDLE_IDENTIFIER}"
              if [[ "$PROFILE_APP_ID" != "$EXPECTED_PROFILE_APP_ID" ]]; then
                echo "ERROR: Profile does not match expected app id $EXPECTED_PROFILE_APP_ID"
                exit 70
              fi
              if [ -z "$PROFILE_UUID" ]; then
                echo "ERROR: Could not parse UUID from provisioning profile: $PROFILE_PATH"
                exit 70
              fi
              if [ -z "$PROFILE_NAME" ]; then
                echo "ERROR: Could not parse Name from provisioning profile: $PROFILE_PATH"
                exit 70
              fi
              cat > /tmp/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>${IOS_BUNDLE_IDENTIFIER}</key>
                <string>${PROFILE_NAME}</string>
              </dict>
              <key>destination</key>
              <string>export</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
            </dict>
          </plist>
          EOF
              mkdir -p build/ios/ipa
              xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportPath build/ios/ipa \
                -exportOptionsPlist /tmp/export_options.plist
            fi
          fi
      - name: Verify IPA output
        script: |
          echo "== List build/ios/ipa =="
          ls -lah build/ios/ipa || true
          echo "== Find IPA files =="
          find build -type f -name "*.ipa" -print || true
          echo "== Inspect archive entitlements =="
          ARCHIVE_PATH="$(find build -type d -name "Runner.xcarchive" | head -n 1)"
          if [ -n "$ARCHIVE_PATH" ]; then
            APP_PATH="$ARCHIVE_PATH/Products/Applications/Runner.app"
            if [ -f "$APP_PATH/embedded.mobileprovision" ]; then
              security cms -D -i "$APP_PATH/embedded.mobileprovision" > /tmp/embedded_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/embedded_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" /tmp/embedded_profile.plist || true
            fi
            codesign -d --entitlements :- "$APP_PATH" > /tmp/app_entitlements.plist 2>/tmp/codesign_entitlements.log || true
            cat /tmp/app_entitlements.plist || true
            cat /tmp/codesign_entitlements.log || true
            if ! grep -q "aps-environment" /tmp/app_entitlements.plist 2>/dev/null; then
              echo "ERROR: Signed Runner.app no incluye aps-environment."
              exit 70
            fi
          fi
          echo "== Find xcode logs =="
          find /tmp/xcodebuild_logs -type f -maxdepth 2 -print || true
      - name: Collect artifacts
        script: |
          mkdir -p artifacts_out
          find /Users/builder/clone -type d -name "*.xcarchive" -exec cp -R {} artifacts_out/ \; || true
          find /tmp/xcodebuild_logs -type f -maxdepth 2 -exec cp -f {} artifacts_out/ \; || true
          echo "== artifacts_out =="
          ls -lah artifacts_out || true
    artifacts:
      - build/ios/ipa/*.ipa
      - artifacts_out/*
      - /tmp/xcodebuild_logs/*.log
