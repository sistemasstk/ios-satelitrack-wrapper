workflows:
  ios_signed_main:
    name: iOS Signed - main
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      groups:
        - ios_secrets
      flutter: stable
      xcode: latest
      vars:
        APP_BASE_URL: "https://app2025.satelitrack.com.co/app2025/"
        APP_VERSION: "2025"
        APPLE_TEAM_ID: "9JJHM44432"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: novadev.Satelital
    scripts:
      - name: Generate iOS project if missing
        script: |
          if [ ! -d ios/Runner.xcodeproj ]; then
            flutter create --platforms=ios --org novadev --project-name ios_satelitrack_wrapper .
          fi
      - name: Force bundle identifier
        script: |
          sed -i.bak 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = novadev.Satelital;/g' ios/Runner.xcodeproj/project.pbxproj
          rm -f ios/Runner.xcodeproj/project.pbxproj.bak
      - name: Inject GoogleService-Info.plist (optional)
        script: |
          if [ -n "${FIREBASE_IOS_PLIST_BASE64:-}" ] && [ "${FIREBASE_IOS_PLIST_BASE64}" != "null" ]; then
            if echo "$FIREBASE_IOS_PLIST_BASE64" | tr -d '\n\r' | base64 --decode > ios/Runner/GoogleService-Info.plist; then
              echo "GoogleService-Info.plist injected from FIREBASE_IOS_PLIST_BASE64"
            else
              echo "WARN: FIREBASE_IOS_PLIST_BASE64 is not valid base64; skipping plist injection"
              rm -f ios/Runner/GoogleService-Info.plist
            fi
          fi
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS signed IPA
        script: |
          flutter build ipa --release \
            --dart-define=APP_BASE_URL=$APP_BASE_URL \
            --dart-define=APP_VERSION=$APP_VERSION
      - name: Export IPA from archive if missing
        script: |
          if ! find build -type f -name "*.ipa" | grep -q .; then
            ARCHIVE_PATH="$(find build -type d -name "Runner.xcarchive" | head -n 1)"
            if [ -n "$ARCHIVE_PATH" ]; then
              cat > /tmp/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>destination</key>
              <string>export</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
            </dict>
          </plist>
          EOF
              mkdir -p build/ios/ipa
              xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportPath build/ios/ipa \
                -exportOptionsPlist /tmp/export_options.plist
            fi
          fi
      - name: Verify IPA output
        script: |
          echo "== List build/ios/ipa =="
          ls -lah build/ios/ipa || true
          echo "== Find IPA files =="
          find build -type f -name "*.ipa" -print || true
          echo "== Find xcode logs =="
          find /tmp/xcodebuild_logs -type f -maxdepth 2 -print || true
      - name: Collect artifacts
        script: |
          mkdir -p artifacts_out
          find /Users/builder/clone -type f -name "*.ipa" -exec cp -f {} artifacts_out/ \; || true
          find /Users/builder/clone -type d -name "*.xcarchive" -exec cp -R {} artifacts_out/ \; || true
          find /tmp/xcodebuild_logs -type f -maxdepth 2 -exec cp -f {} artifacts_out/ \; || true
          echo "== artifacts_out =="
          ls -lah artifacts_out || true
    artifacts:
      - build/ios/ipa/*.ipa
      - artifacts_out/*
      - /tmp/xcodebuild_logs/*.log

