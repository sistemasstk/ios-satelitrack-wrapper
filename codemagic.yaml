workflows:
  ios_signed_main:
    name: iOS Signed - main
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      groups:
        - ios_secrets
      flutter: stable
      xcode: latest
      vars:
        APP_BASE_URL: "https://app.satelitrack.com.co/"
        APP_VERSION: "2025"
        APP_STORE_VERSION: "1.2.0"
        APPLE_TEAM_ID: "9JJHM44432"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: novadev.Satelital
    scripts:
      - name: Generate iOS project if missing
        script: |
          if [ ! -d ios/Runner.xcodeproj ]; then
            flutter create --platforms=ios --org novadev --project-name ios_satelitrack_wrapper .
          fi
      - name: Enable iOS push capabilities
        script: |
          INFO_PLIST="ios/Runner/Info.plist"
          ENTITLEMENTS="ios/Runner/Runner.entitlements"
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          mkdir -p ios/Runner
          if [ ! -d "ios/Runner.xcodeproj" ]; then
            echo "ERROR: ios/Runner.xcodeproj no existe despues de bootstrap."
            ls -lah ios || true
            exit 1
          fi

          cat > "$ENTITLEMENTS" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>aps-environment</key>
              <string>production</string>
            </dict>
          </plist>
          PLIST

          if [ -f "$INFO_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$INFO_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" "$INFO_PLIST" 2>/dev/null || true
          else
            echo "WARN: Info.plist no encontrado en $INFO_PLIST"
          fi

          if [ -f "$PBXPROJ" ] && ! grep -q "Runner/Runner.entitlements" "$PBXPROJ"; then
            python3 - "$PBXPROJ" <<'PY'
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          content = path.read_text()
          needle = "CODE_SIGN_STYLE = Automatic;"
          replacement = "CODE_SIGN_STYLE = Automatic;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;"

          if "Runner/Runner.entitlements" not in content and needle in content:
              content = content.replace(needle, replacement)
              path.write_text(content)
          PY
          elif [ ! -f "$PBXPROJ" ]; then
            echo "WARN: project.pbxproj no encontrado en $PBXPROJ"
          fi

          echo "Push capabilities configuradas"
      - name: Allow app.satelitrack.com.co over ATS
        script: |
          INFO_PLIST="ios/Runner/Info.plist"
          if [ -f "$INFO_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$INFO_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent true" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains dict" "$INFO_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:app.satelitrack.com.co dict" "$INFO_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:app.satelitrack.com.co:NSIncludesSubdomains bool true" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSExceptionDomains:app.satelitrack.com.co:NSIncludesSubdomains true" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:app.satelitrack.com.co:NSTemporaryExceptionAllowsInsecureHTTPLoads bool true" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSExceptionDomains:app.satelitrack.com.co:NSTemporaryExceptionAllowsInsecureHTTPLoads true" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:app.satelitrack.com.co:NSTemporaryExceptionMinimumTLSVersion string TLSv1.0" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSExceptionDomains:app.satelitrack.com.co:NSTemporaryExceptionMinimumTLSVersion TLSv1.0" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Print :NSAppTransportSecurity" "$INFO_PLIST"
          else
            echo "WARN: Info.plist not found to set ATS exceptions"
          fi
      - name: Force bundle identifier
        script: |
          sed -i.bak 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = novadev.Satelital;/g' ios/Runner.xcodeproj/project.pbxproj
          rm -f ios/Runner.xcodeproj/project.pbxproj.bak
      - name: Inject GoogleService-Info.plist (optional)
        script: |
          if [ -n "${FIREBASE_IOS_PLIST_BASE64:-}" ] && [ "${FIREBASE_IOS_PLIST_BASE64}" != "null" ]; then
            if echo "$FIREBASE_IOS_PLIST_BASE64" | tr -d '\n\r' | base64 --decode > ios/Runner/GoogleService-Info.plist; then
              echo "GoogleService-Info.plist injected from FIREBASE_IOS_PLIST_BASE64"
            else
              echo "WARN: FIREBASE_IOS_PLIST_BASE64 is not valid base64; skipping plist injection"
              rm -f ios/Runner/GoogleService-Info.plist
            fi
          fi
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Debug signing assets
        script: |
          echo "== Code signing identities =="
          security find-identity -v -p codesigning || true
          echo "== Provisioning profiles =="
          ls -lah ~/Library/MobileDevice/Provisioning\ Profiles || true
          echo "== Profiles match bundle id =="
          grep -R "novadev.Satelital" ~/Library/MobileDevice/Provisioning\ Profiles 2>/dev/null | head -n 20 || true
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Apply custom app icon (optional)
        script: |
          if [ -f assets/icon.png ]; then
            # Ensure iOS icon source is square 1024x1024 before generation.
            WIDTH="$(sips -g pixelWidth assets/icon.png | awk '/pixelWidth/{print $2}')"
            HEIGHT="$(sips -g pixelHeight assets/icon.png | awk '/pixelHeight/{print $2}')"
            if [ "$WIDTH" != "$HEIGHT" ]; then
              MIN_SIDE="$WIDTH"
              if [ "$HEIGHT" -lt "$WIDTH" ]; then MIN_SIDE="$HEIGHT"; fi
              sips -c "$MIN_SIDE" "$MIN_SIDE" assets/icon.png --out /tmp/icon-square.png >/dev/null
              sips -z 1024 1024 /tmp/icon-square.png --out assets/icon.png >/dev/null
            else
              sips -z 1024 1024 assets/icon.png --out assets/icon.png >/dev/null
            fi
            flutter pub run flutter_launcher_icons
          else
            echo "No assets/icon.png found, using default icon."
          fi
      - name: Build iOS signed IPA
        script: |
          flutter build ipa --release \
            --build-name=$APP_STORE_VERSION \
            --build-number=$CM_BUILD_ID \
            --dart-define=APP_BASE_URL=$APP_BASE_URL \
            --dart-define=APP_VERSION=$APP_VERSION
      - name: Export IPA from archive if missing
        script: |
          if ! find build -type f -name "*.ipa" | grep -q .; then
            ARCHIVE_PATH="$(find build -type d -name "Runner.xcarchive" | head -n 1)"
            if [ -n "$ARCHIVE_PATH" ]; then
              PROFILE_PATH="$(find ~/Library/MobileDevice/Provisioning\ Profiles -type f -name "*.mobileprovision" | head -n 1)"
              if [ -z "$PROFILE_PATH" ]; then
                echo "ERROR: Provisioning profile for novadev.Satelital not found in runner."
                ls -lah ~/Library/MobileDevice/Provisioning\ Profiles || true
                exit 70
              fi
              security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
              PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist 2>/dev/null || true)"
              PROFILE_UUID="$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist 2>/dev/null || true)"
              PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist 2>/dev/null || true)"
              echo "Using profile path: $PROFILE_PATH"
              echo "Using profile app id: $PROFILE_APP_ID"
              echo "Using profile UUID: $PROFILE_UUID"
              echo "Using profile Name: $PROFILE_NAME"
              if [[ "$PROFILE_APP_ID" != "9JJHM44432.novadev.Satelital" ]]; then
                echo "ERROR: Profile does not match expected app id 9JJHM44432.novadev.Satelital"
                exit 70
              fi
              if [ -z "$PROFILE_UUID" ]; then
                echo "ERROR: Could not parse UUID from provisioning profile: $PROFILE_PATH"
                exit 70
              fi
              if [ -z "$PROFILE_NAME" ]; then
                echo "ERROR: Could not parse Name from provisioning profile: $PROFILE_PATH"
                exit 70
              fi
              cat > /tmp/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>novadev.Satelital</key>
                <string>${PROFILE_NAME}</string>
              </dict>
              <key>destination</key>
              <string>export</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
            </dict>
          </plist>
          EOF
              mkdir -p build/ios/ipa
              xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportPath build/ios/ipa \
                -exportOptionsPlist /tmp/export_options.plist
            fi
          fi
      - name: Verify IPA output
        script: |
          echo "== List build/ios/ipa =="
          ls -lah build/ios/ipa || true
          echo "== Find IPA files =="
          find build -type f -name "*.ipa" -print || true
          echo "== Find xcode logs =="
          find /tmp/xcodebuild_logs -type f -maxdepth 2 -print || true
      - name: Collect artifacts
        script: |
          mkdir -p artifacts_out
          find /Users/builder/clone -type d -name "*.xcarchive" -exec cp -R {} artifacts_out/ \; || true
          find /tmp/xcodebuild_logs -type f -maxdepth 2 -exec cp -f {} artifacts_out/ \; || true
          echo "== artifacts_out =="
          ls -lah artifacts_out || true
    artifacts:
      - build/ios/ipa/*.ipa
      - artifacts_out/*
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        expire_build_submitted_for_review: true
      email:
        recipients:
          - ingenieria@satelitrack.com.co
        notify:
          success: true
          failure: true

