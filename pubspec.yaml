name: ios_satelitrack_wrapper
description: Flutter iOS wrapper for Satelitrack app2025 with dual APNs/FCM bootstrap.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  ios: true
  image_path: assets/icon.png
  remove_alpha_ios: true
